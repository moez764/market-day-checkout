<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Market Day Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- INLINE CSS SO IT'S NOT JUST PLAIN TEXT -->
  <style>
    :root {
      --bg: #f7f0ea;
      --card: #ffffff;
      --accent: #b96e4b;
      --accent-soft: #f3ddd2;
      --text-main: #3b2a26;
      --text-muted: #8a6a5c;
      --border-soft: #e0cfc3;
      --danger: #d9534f;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
    }

    body.admin-body {
      background: radial-gradient(circle at top, #ffe3cf 0, #f7f0ea 55%, #f0e2d7 100%);
      min-height: 100vh;
      color: var(--text-main);
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    .admin-wrap {
      width: 100%;
      max-width: 960px;
    }

    .locked-screen,
    .admin-panel {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 18px;
      padding: 20px 18px 24px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
    }

    .admin-header {
      margin-bottom: 16px;
    }

    .admin-header h1 {
      font-size: 24px;
      margin-bottom: 4px;
    }

    .admin-header p {
      font-size: 14px;
      color: var(--text-muted);
    }

    h2 {
      font-size: 18px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card {
      background: linear-gradient(135deg, #ffffff 0, #fff9f5 60%, #ffece0 100%);
      border-radius: 16px;
      padding: 16px 14px 18px;
      border: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 10px 30px rgba(186, 127, 98, 0.18);
      margin-bottom: 18px;
    }

    .card-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 10px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    @media (min-width: 720px) {
      .form-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    label {
      font-size: 13px;
      color: var(--text-muted);
    }

    input[type="text"],
    input[type="number"],
    input[type="password"] {
      border-radius: 10px;
      border: 1px solid var(--border-soft);
      padding: 8px 10px;
      font-size: 14px;
      outline: none;
      transition: border 0.15s ease, box-shadow 0.15s ease;
      background: rgba(255, 255, 255, 0.92);
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(185, 110, 75, 0.18);
    }

    .help-text {
      font-size: 11px;
      color: var(--text-muted);
    }

    .btn {
      border-radius: 999px;
      border: none;
      padding: 8px 14px;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      gap: 6px;
      white-space: nowrap;
      transition: transform 0.08s ease, box-shadow 0.08s ease,
        background 0.12s ease, color 0.12s ease, border 0.12s ease;
    }

    .btn.primary {
      background: radial-gradient(circle at top left, #ffcf9b 0, #ff9b73 40%, #ff6b6b 100%);
      color: #2f1306;
      font-weight: 600;
      box-shadow: 0 10px 25px rgba(255, 137, 94, 0.35);
    }

    .btn.primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 30px rgba(255, 137, 94, 0.45);
    }

    .btn.primary:active {
      transform: translateY(0);
      box-shadow: 0 6px 18px rgba(255, 137, 94, 0.3);
    }

    .btn.btn-outline {
      background: rgba(255, 255, 255, 0.9);
      color: var(--accent);
      border: 1px solid var(--accent-soft);
    }

    .btn.btn-outline:hover {
      background: var(--accent-soft);
    }

    .locked-screen h1 {
      font-size: 24px;
      margin-bottom: 6px;
    }

    .locked-screen p {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .list-column {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 360px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .product-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 9px;
      border-radius: 11px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.06);
    }

    .product-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .product-name {
      font-size: 14px;
      font-weight: 600;
    }

    .product-extra {
      font-size: 12px;
      color: var(--text-muted);
    }

    .product-price {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
    }

    .order-card {
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.9);
      background: rgba(255, 255, 255, 0.95);
      padding: 8px 9px 9px;
      box-shadow: 0 5px 14px rgba(0, 0, 0, 0.08);
    }

    .order-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 5px;
    }

    .order-id {
      font-size: 13px;
      font-weight: 600;
    }

    .order-meta {
      font-size: 11px;
      color: var(--text-muted);
    }

    .order-total {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
    }

    .order-items {
      list-style: none;
      font-size: 12px;
      color: var(--text-main);
    }

    .order-items li + li {
      margin-top: 2px;
    }

    .btn-danger {
      background: rgba(217, 83, 79, 0.1);
      color: var(--danger);
      border-radius: 999px;
      border: 1px solid rgba(217, 83, 79, 0.4);
      font-size: 11px;
      padding: 4px 9px;
      cursor: pointer;
    }

    .btn-danger:hover {
      background: rgba(217, 83, 79, 0.18);
    }
  </style>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script defer src="main.js"></script>
</head>
<body class="admin-body">
  <div class="admin-wrap">

    <!-- LOCK SCREEN -->
    <div id="locked" class="locked-screen">
      <h1>Admin login</h1>
      <p>Enter the admin password to manage products and view orders.</p>
      <div class="form-grid">
        <div class="form-field">
          <label for="admin-pass">Password</label>
          <input id="admin-pass" type="password" placeholder="••••••••" />
        </div>
      </div>
      <button id="unlock-btn" class="btn primary">Unlock</button>
    </div>

    <!-- ADMIN CONTENT -->
    <div class="admin-panel" id="admin-content" style="display:none">
      <header class="admin-header">
        <h1>Admin – Market Day</h1>
        <p>Manage products, prices, images, and track incoming orders.</p>
      </header>

      <!-- ADD PRODUCT -->
      <section class="card">
        <h2>Add product</h2>

        <div class="form-grid">
          <div class="form-field">
            <label for="product-name">Name</label>
            <input id="product-name" type="text" placeholder="Brownie" />
          </div>

          <div class="form-field">
            <label for="product-price">Price (AED)</label>
            <input
              id="product-price"
              type="number"
              step="0.01"
              min="0"
              placeholder="5.00"
            />
          </div>

          <div class="form-field">
            <label for="product-category">Category</label>
            <input
              id="product-category"
              type="text"
              placeholder="Drinks, Desserts…"
            />
          </div>

          <div class="form-field">
            <label for="product-image-url">Image link</label>
            <input
              id="product-image-url"
              type="text"
              placeholder="https://your-storage-url/image.png"
            />
            <small class="help-text">
              Paste a direct image URL (Supabase Storage public URL or any public image link).
            </small>
          </div>
        </div>

        <button id="add-product-btn" class="btn primary">Add product</button>
      </section>

      <!-- PRODUCT LIST -->
      <section class="card">
        <div class="card-header-row">
          <h2>Products</h2>
        </div>
        <div id="admin-product-list" class="list-column">
          <!-- Filled by main.js -->
        </div>
      </section>

      <!-- ORDERS -->
      <section class="card">
        <div class="card-header-row">
          <h2>Orders</h2>
          <button id="refresh-orders-btn" class="btn btn-outline">
            Refresh
          </button>
        </div>
        <div id="orders-list" class="list-column">
          <!-- Filled by main.js -->
        </div>
      </section>
    </div>
  </div>
</body>
</html>
