<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Market Day Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script defer src="main.js"></script>
</head>
<body class="admin-body">
  <div class="admin-wrap">

    <!-- LOCK SCREEN -->
    <div id="locked" class="locked-screen">
      <h1>Admin login</h1>
      <p>Enter the admin password to manage products and view orders.</p>
      <div class="form-grid">
        <div class="form-field">
          <label for="admin-pass">Password</label>
          <input id="admin-pass" type="password" placeholder="••••••••" />
        </div>
      </div>
      <button id="unlock-btn" class="btn primary">Unlock</button>
    </div>

    <!-- ADMIN CONTENT -->
    <div class="admin-panel" id="admin-content" style="display:none">
      <header class="admin-header">
        <h1>Admin – Market Day</h1>
        <p>Manage products, prices, images, and track incoming orders.</p>
      </header>

      <!-- ADD PRODUCT -->
      <section class="card">
        <h2>Add product</h2>

        <div class="form-grid">
          <div class="form-field">
            <label for="product-name">Name</label>
            <input id="product-name" type="text" placeholder="Brownie" />
          </div>

          <div class="form-field">
            <label for="product-price">Price (AED)</label>
            <input
              id="product-price"
              type="number"
              step="0.01"
              min="0"
              placeholder="5.00"
            />
          </div>

          <div class="form-field">
            <label for="product-category">Category</label>
            <input
              id="product-category"
              type="text"
              placeholder="Drinks, Desserts…"
            />
          </div>

          <div class="form-field">
            <label for="product-image-url">Image link</label>
            <input
              id="product-image-url"
              type="text"
              placeholder="https://your-storage-url/image.png"
            />
            <small class="help-text">
              Paste a direct image URL (Supabase Storage public URL or any public image link).
            </small>
          </div>
        </div>

        <button id="add-product-btn" class="btn primary">Add product</button>
      </section>

      <!-- PRODUCT LIST -->
      <section class="card">
        <div class="card-header-row">
          <h2>Products</h2>
        </div>
        <div id="admin-product-list" class="list-column">
          <!-- Filled by main.js -->
        </div>
      </section>

      <!-- ORDERS -->
      <section class="card">
        <div class="card-header-row">
          <h2>Orders</h2>
          <button id="refresh-orders-btn" class="btn btn-outline">
            Refresh
          </button>
        </div>
        <div id="orders-list" class="list-column">
          <!-- Filled by main.js -->
        </div>
      </section>
    </div>
  </div>
</body>
</html>
