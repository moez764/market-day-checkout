<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sweet Treats Kiosk</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg: #fff7f2;
      --accent: #ff7a59;
      --accent-dark: #e35a3a;
      --accent-soft: #ffe0d3;
      --text-main: #2b1b16;
      --card-bg: #ffffff;
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, sans-serif;
    }

    body {
      background: radial-gradient(circle at top left, #ffe9cf, #fff7f2 40%, #fff 80%);
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 20px;
    }

    .kiosk-shell {
      width: 100%;
      max-width: 1200px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 40px;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.15);
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 0;
      overflow: hidden;
    }

    /* LEFT SIDE: menu */
    .menu-side {
      padding: 28px 32px 28px 32px;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #fff7f2 0%, #ffe4d9 40%, #fff7f2 100%);
      position: relative;
    }

    .menu-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand-title {
      font-size: 28px;
      font-weight: 800;
      color: var(--text-main);
      letter-spacing: 0.04em;
    }

    .brand-subtitle {
      font-size: 14px;
      color: #7a5a4a;
    }

    .kiosk-badge {
      background: #fff;
      color: var(--accent-dark);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .kiosk-badge span {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #00c46a;
    }

    .menu-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    .menu-subtitle {
      font-size: 14px;
      color: #8a6a5c;
      margin-bottom: 18px;
    }

    .category-pills {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .pill {
      padding: 8px 14px;
      border-radius: 999px;
      border: none;
      background: rgba(255, 255, 255, 0.8);
      color: #8a6a5c;
      font-size: 13px;
      font-weight: 500;
    }

    .pill.primary {
      background: var(--accent);
      color: white;
    }

    .product-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 16px;
      padding-right: 8px;
      padding-bottom: 4px;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    .product-card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: 12px 12px 14px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .product-tag {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(255, 122, 89, 0.12);
      color: var(--accent-dark);
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
    }

    .product-emoji {
      font-size: 28px;
      margin-bottom: 6px;
    }

    .product-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 4px;
    }

    .product-desc {
      font-size: 13px;
      color: #8a6a5c;
      margin-bottom: 10px;
    }

    .product-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .product-price {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent-dark);
    }

    .product-price span {
      font-size: 12px;
      font-weight: 500;
      color: #a0786a;
      margin-left: 2px;
    }

    .btn-add {
      border: none;
      border-radius: 999px;
      padding: 8px 14px;
      background: var(--accent);
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(255, 122, 89, 0.35);
      transition: transform 0.05s ease, box-shadow 0.05s ease, background 0.1s ease;
    }

    .btn-add:active {
      transform: translateY(1px);
      box-shadow: 0 3px 10px rgba(255, 122, 89, 0.3);
      background: var(--accent-dark);
    }

    /* RIGHT SIDE: cart */
    .cart-side {
      background: #1f1410;
      color: white;
      padding: 24px 24px 24px 22px;
      display: flex;
      flex-direction: column;
    }

    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .cart-title {
      font-size: 18px;
      font-weight: 700;
    }

    .order-id-hint {
      font-size: 11px;
      color: #e3c9b9;
      max-width: 180px;
      text-align: right;
    }

    .cart-items {
      flex: 1;
      background: rgba(10, 7, 6, 0.85);
      border-radius: var(--radius-md);
      padding: 12px;
      overflow-y: auto;
      margin-bottom: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .cart-empty {
      font-size: 13px;
      color: #bca99c;
      text-align: center;
      margin-top: 12px;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.04);
      margin-bottom: 6px;
    }

    .cart-item-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .cart-item-name {
      font-size: 13px;
      font-weight: 600;
    }

    .cart-item-meta {
      font-size: 11px;
      color: #d0b8aa;
    }

    .cart-item-price {
      font-size: 14px;
      font-weight: 700;
    }

    .cart-footer {
      border-top: 1px dashed rgba(255, 255, 255, 0.18);
      padding-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .cart-total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-total-label {
      font-size: 14px;
      color: #e3c9b9;
    }
